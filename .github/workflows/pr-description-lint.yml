name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR description format
        env:
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
        run: |
          set -euo pipefail
          printf '%s' "$PR_BODY_JSON" | jq -r '.' > /tmp/pr_body.md

          required_headers=(
            "#### Context"
            "#### TL;DR"
            "#### Summary"
            "#### Alternatives"
            "#### Test Plan"
          )

          for header in "${required_headers[@]}"; do
            if ! grep -Fq "$header" /tmp/pr_body.md; then
              echo "Missing required PR section: $header" >&2
              exit 1
            fi
          done

          # Allow additional sections (for example, automation summaries), but
          # block obvious unfinished placeholders such as list items starting with
          # TODO/TBD. This avoids false positives for prose like "detect TODO/TBD".
          if grep -Ein '^[[:space:]]*([-*]|[0-9]+\.)?[[:space:]]*(TODO|TBD)\b([[:space:]:.!?,)]|$)' /tmp/pr_body.md; then
            echo "PR description still contains TODO/TBD placeholders" >&2
            exit 1
          fi
