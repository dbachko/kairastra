services:
  symphony-rust:
    build:
      context: ..
      dockerfile: rust/Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.114.0}
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WORKFLOW_PATH: /config/WORKFLOW.md
      SYMPHONY_WORKSPACE_ROOT: ${SYMPHONY_WORKSPACE_ROOT:-/workspaces}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ${WORKFLOW_FILE:-../WORKFLOW.md}:/config/WORKFLOW.md:ro
      - symphony_rust_workspaces:${SYMPHONY_WORKSPACE_ROOT:-/workspaces}
    restart: unless-stopped

volumes:
  symphony_rust_workspaces:
