services:
  symphony-rust:
    build:
      context: ..
      dockerfile: rust/Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.114.0}
    environment:
      SYMPHONY_DEPLOY_MODE: docker
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      CODEX_AUTH_MODE: ${CODEX_AUTH_MODE:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WORKFLOW_PATH: /config/WORKFLOW.md
      SYMPHONY_WORKSPACE_ROOT: ${SYMPHONY_WORKSPACE_ROOT:-/workspaces}
      SYMPHONY_SEED_REPO: /seed-repo
      SYMPHONY_GITHUB_OWNER: ${SYMPHONY_GITHUB_OWNER:-}
      SYMPHONY_GITHUB_REPO: ${SYMPHONY_GITHUB_REPO:-}
      SYMPHONY_GITHUB_PROJECT_NUMBER: ${SYMPHONY_GITHUB_PROJECT_NUMBER:-}
      SYMPHONY_GITHUB_PROJECT_URL: ${SYMPHONY_GITHUB_PROJECT_URL:-}
      SYMPHONY_GIT_CLONE_URL: ${SYMPHONY_GIT_CLONE_URL:-}
      SYMPHONY_GIT_PUSH_URL: ${SYMPHONY_GIT_PUSH_URL:-}
      SYMPHONY_AGENT_ASSIGNEE: ${SYMPHONY_AGENT_ASSIGNEE:-}
      SYMPHONY_GIT_AUTHOR_NAME: ${SYMPHONY_GIT_AUTHOR_NAME:-}
      SYMPHONY_GIT_AUTHOR_EMAIL: ${SYMPHONY_GIT_AUTHOR_EMAIL:-}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ${WORKFLOW_FILE:-../WORKFLOW.md}:/config/WORKFLOW.md:ro
      - ${SEED_REPO_PATH:-..}:/seed-repo:ro
      - symphony_rust_workspaces:${SYMPHONY_WORKSPACE_ROOT:-/workspaces}
      - symphony_rust_codex:/root/.codex
    restart: unless-stopped

volumes:
  symphony_rust_workspaces:
  symphony_rust_codex:
