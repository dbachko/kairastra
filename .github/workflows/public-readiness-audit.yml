name: public-readiness-audit

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run public-readiness audit
        run: bash scripts/public-readiness-audit.sh --output-dir reports/public-readiness

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-readiness-audit-${{ github.run_id }}
          path: reports/public-readiness
          if-no-files-found: error
